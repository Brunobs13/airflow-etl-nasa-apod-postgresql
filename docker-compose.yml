version: "3"

services:
  postgres:
    image: postgres:13
    container_name: etl_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-airflow_ops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow_network

networks:
  airflow_network:
    external: false

volumes:
  postgres_data:
